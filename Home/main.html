<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Khám Phá Du Lịch Việt Nam</title>

  <!-- Bootstrap CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="./Home/sidebar.css">
  <link rel="stylesheet" href="./Home/mainwindow.css">
  <link rel="stylesheet" href="./Home/floating_map.css">
  <link rel="stylesheet" href="./Home/Pages.css">
</head>
<body>
  <!-- nút 3 gạch -->
  <div class="hamburger-menu" id="hamburgerBtn" aria-label="Mở menu">
    <span></span>
  </div>

  <!-- Dropdown menu -->
  <div class="dropdown-menu-mobile" id="dropdownMenu">
    <a href="./" class="navbar-brand">
      <img src="./Home/LOGOVKU.png" alt="Logo VKU" width="50px" height="50px">
    </a>
    
    <a href="#" onclick="loadContent('./Home/home.html')">Home</a>
    <a href="#" onclick="loadContent('./Profile/profile.html')">Profile</a>
  </div>

  <div class="container-fluid">
    <div class="row">
      <!-- Sidebar -->
      <div class="col-2 wrap-sidebar">
        <nav class="sidebar">
          <!-- <h1><a class="logo" href="./">Du Lịch Việt Nam</a></h1> -->
          <a href="./" style="display: inline-block; width: 100%; text-align: center;"><img src="./Home/LOGOVKU.png" alt="Logo" style="height: 80px;"></a>
          <ul class="nav flex-column">
            <li class="nav-item"><a class="nav-link" href="#" onclick="loadContent('./Home/home.html')">Home</a></li>
            <li class="nav-item"><a class="nav-link" href="#" onclick="loadContent('./Profile/profile.html')">Profile</a></li>
            <!-- <li class="nav-item"><a class="nav-link" href="#" onclick="loadContent('./Creator/contact.html')">Contact</a></li>
            <li class="nav-item"><a class="nav-link" href="#" data-bs-toggle="modal" data-bs-target="#mapModal">Map</a></li> -->
          </ul>
        </nav>
      </div>

      <!-- Main Content -->
      <main class="col-10 main" id="content-area">
        <!-- <h1>Home Page</h1>
        <p>Chào mừng đến với website!</p> -->
      </main>
    </div>
  </div>

  <!-- Floating Button -->
  <div class="floating-bubble">
    <a href="#" data-bs-toggle="modal" data-bs-target="#mapModal">
      <img src="./Home/quocki.png" alt="Quốc kỳ">
    </a>
  </div>

  <!-- Modal hiển thị bản đồ -->
  <div class="modal fade" id="mapModal" tabindex="-1" aria-labelledby="mapModalLabel" aria-hidden="true">
    <div class="modal-dialog modal-lg">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title" id="mapModalLabel">Chọn tỉnh thành</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
        </div>
        <div class="modal-body">
          <iframe src="./Map/map.html" style="width: 100%; height: 80vh; border: none;" scrolling="yes"></iframe>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<script>
  // Load mặc định
  window.onload = function () {
    loadContent('./Home/home.html');
  };

    function loadContent(page) {
      // Thêm chuỗi thời gian vào URL để tránh cache
      const url = `${page}?v=${Date.now()}`;

      fetch(url)
        .then(res => res.text())
        .then(data => {
          document.getElementById('content-area').innerHTML = data;
        })
        .catch(err => console.error("Lỗi khi load:", err));
    }

  const hamburger = document.getElementById('hamburgerBtn');
  const dropdownMenu = document.getElementById('dropdownMenu');

  // Toggle menu khi bấm hamburger
  hamburger.addEventListener('click', function (e) {
    e.stopPropagation(); // Ngăn sự kiện click lan ra ngoài
    dropdownMenu.style.display = (dropdownMenu.style.display === 'block') ? 'none' : 'block';
  });

  // Ngăn sự kiện click bên trong menu không bị ẩn
  dropdownMenu.addEventListener('click', function (e) {
    e.stopPropagation();
  });

  // Click bên ngoài -> ẩn menu
  document.addEventListener('click', function () {
    dropdownMenu.style.display = 'none';
  });

</script>





</body>
</html>
